<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transitions</title>
    <link rel="stylesheet" href="./assets/css/transitions.css">
</head>
<body>
    <main>
        <div class="card">
            <div class="card-title">1. Transitions properties</div>
            <div class="demo">
                <div>
                    <div class="box  transition-color"></div>
                    <div class="label">Background</div>
                </div>
                <div>
                    <div class="box transition-width"></div>
                    <div class="label">Width</div>
                </div>
                <div>
                    <div class="box transition-all"></div>
                    <div class="label">All</div>
                </div>
            </div>
        </div>

        <div class="card">
				<div class="card-title">2. Transition ease</div>
				<div class="demo demo-timing">
					<div class="timing-row">
						<span class="timing-label">ease</span>
						<div class="timing-track"><div class="timing-box ease"></div></div>
					</div>
					<div class="timing-row">
						<span class="timing-label">linear</span>
						<div class="timing-track"><div class="timing-box linear"></div></div>
					</div>
					<div class="timing-row">
						<span class="timing-label">ease-in</span>
						<div class="timing-track"><div class="timing-box ease-in"></div></div>
					</div>
					<div class="timing-row">
						<span class="timing-label">ease-out</span>
						<div class="timing-track"><div class="timing-box ease-out"></div></div>
					</div>
					<div class="timing-row">
						<span class="timing-label">ease-in-out</span>
						<div class="timing-track"><div class="timing-box ease-in-out"></div></div>
					</div>
				</div>
        </div>
    </main>
</body>
</html>
